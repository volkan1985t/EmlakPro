name: Deploy EmlakPro

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/emlakpro/src
            git pull origin main
            /usr/local/go/bin/go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
              /usr/local/go/bin/go build \
              -ldflags="-s -w -X main.version=$(git rev-parse --short HEAD)" \
              -o /opt/emlakpro/bin/emlakpro \
              ./cmd/server/
            systemctl restart emlakpro
            sleep 2
            curl -sf http://localhost:8080/api/health | grep -q "ok"
            echo "✅ Deploy başarılı: $(git rev-parse --short HEAD)"
